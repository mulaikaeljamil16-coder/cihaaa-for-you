<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forever With You 🫂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{

font-family:Poppins,sans-serif;
overflow-x:hidden;
background:#000;
color:white;

}

canvas{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-5;

}

#loading{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;

}

.loader{

width:90px;
height:90px;
border-radius:50%;
border:5px solid rgba(255,255,255,.2);
border-top:5px solid white;
animation:spin 1.5s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

.loadingText{

margin-top:25px;
font-size:18px;
letter-spacing:2px;
opacity:.8;

}

.hero{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;

background:

linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.55)),
url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

}

.hero h1{

font-family:"Great Vibes";
font-size:90px;

text-shadow:

0 0 25px pink,
0 0 60px white;

animation:fadeDown 2s;

}

.hero h2{

margin-top:20px;
font-size:22px;
font-weight:300;
animation:fadeUp 2s;

}

.hero button{

margin-top:45px;
padding:18px 45px;
border:none;
border-radius:60px;
background:white;
color:#ff4d88;
font-size:20px;
cursor:pointer;
transition:.4s;

box-shadow:

0 0 25px pink;

}

.hero button:hover{

transform:scale(1.08);

}

@keyframes fadeDown{

from{

opacity:0;
transform:translateY(-60px);

}

to{

opacity:1;
transform:translateY(0);

}

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(60px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.section{

padding:100px 25px;

background:

linear-gradient(
180deg,
#1a0010,
#290018,
#000
);

}

.glass{

max-width:950px;

margin:auto;

padding:40px;

border-radius:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

box-shadow:

0 0 45px rgba(255,192,203,.25);

}

.title{

font-family:"Great Vibes";

font-size:65px;

margin-bottom:35px;

text-align:center;

}

.typing{

font-size:19px;

line-height:2;

white-space:pre-line;

min-height:450px;

}

.gallery{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));

gap:25px;

margin-top:50px;

}

.gallery img{

width:100%;

height:320px;

object-fit:cover;

border-radius:22px;

cursor:pointer;

transition:.5s;

box-shadow:

0 0 25px rgba(255,182,193,.45);

}

.gallery img:hover{

transform:scale(1.06) rotate(-1deg);

box-shadow:

0 0 40px rgba(255,182,193,.8);

}

.music{

margin-top:70px;

text-align:center;

}

.music button{

padding:18px 40px;

border:none;

border-radius:50px;

background:#fff;

color:#ff4d88;

font-size:18px;

cursor:pointer;

transition:.3s;

box-shadow:0 0 20px pink;

}

.music button:hover{

transform:scale(1.08);

}

#loveMessage{

margin-top:35px;

font-size:28px;

display:none;

animation:fade 1.2s;

font-family:"Great Vibes";

}

@keyframes fade{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.heart{

position:fixed;

top:-30px;

pointer-events:none;

animation:fall linear forwards;

z-index:999;

}

@keyframes fall{

0%{

transform:translateY(-5vh) rotate(0deg);

opacity:1;

}

100%{

transform:translateY(110vh) rotate(360deg);

opacity:0;

}

}

footer{

padding:80px 20px;

text-align:center;

background:#000;

font-size:18px;

line-height:2;

opacity:.9;

}

.lightbox{

position:fixed;

inset:0;

background:rgba(0,0,0,.9);

display:none;

justify-content:center;

align-items:center;

z-index:99999;

}

.lightbox img{

max-width:90%;

max-height:90%;

border-radius:20px;

box-shadow:0 0 40px pink;

}

.close{

position:absolute;

top:25px;

right:35px;

font-size:40px;

cursor:pointer;

}

</style>

</head>

<body>

<div id="loading">

<div class="loader"></div>

<div class="loadingText">

Loading Love...

</div>

</div>

<canvas id="stars"></canvas>

<section class="hero">

<h1>Forever With You 🫂</h1>

<h2>

Untuk

<b>Cihaa Honey🤍</b>

</h2>

<button onclick="startLove()">

🤍 Touch My Heart

</button>

</section>

<section class="section">

<div class="glass">

<div class="title">

A Letter For You 🤍

</div>

<div class="typing" id="typing"></div>

<div class="gallery">

<img src="foto1.jpg" onclick="openImg(this.src)">
<img src="foto2.jpg" onclick="openImg(this.src)">
<img src="foto3.jpg" onclick="openImg(this.src)">
<img src="foto4.jpg" onclick="openImg(this.src)">
<img src="foto5.jpg" onclick="openImg(this.src)">
<img src="foto6.jpg" onclick="openImg(this.src)">
<img src="foto7.jpg" onclick="openImg(this.src)">

</div>

<div class="music">

<button onclick="playMusic()">

🎵 Play Our Song

</button>

<br><br>

<audio id="music" loop>

<source src="lagu.mp3" type="audio/mpeg">

</audio>

<div id="loveMessage">

Aku akan selalu memilih kamu.
Hari ini.
Besok.
Lusa.
Dan seterusnya.

🤍

</div>

</div>

</div>

</section>

<footer>

<h2 style="font-family:'Great Vibes';font-size:50px;">

Forever With You 🫂

</h2>

<p>

"You are my favorite place to come home."

</p>

<br>

<p>

Untuk :

<b>Cihaa Honey🤍</b>

</p>

<br>

<p>

From :

<b>Mulaika🫂</b>

</p>

</footer>

<div class="lightbox" id="lightbox">

<span class="close" onclick="closeImg()">

✕

</span>

<img id="preview">

</div>

<script>

const message=`Hai Sayang...

Terima kasih karena sudah hadir di hidupku.

Mungkin aku bukan orang yang paling sempurna.

Aku juga sering membuatmu kesal.

Sering membuatmu menunggu.

Sering membuatmu kecewa.

Tapi percayalah...

Tidak ada satu hari pun
di mana aku berhenti bersyukur
karena semesta mempertemukan aku
dengan seseorang sebaik kamu.

Aku tidak tahu
apa yang akan terjadi besok.

Aku tidak tahu
seberapa panjang perjalanan kita.

Yang aku tahu...

Kalau suatu hari nanti
aku diminta memilih lagi...

Aku akan tetap memilih kamu.

Berulang kali.

Tanpa ragu.

Karena bagiku...

Rumah bukanlah sebuah tempat.

Rumah adalah ketika aku berada di dekatmu.

I Love You.

Forever.

🤍`;

let i=0;

function typeWriter(){

if(i<message.length){

document.getElementById("typing").innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,38);

}

}

function startLove(){

window.scrollTo({

top:window.innerHeight,

behavior:"smooth"

});

document.getElementById("music").play();

if(i===0){

typeWriter();

}

}

function playMusic(){

const music=document.getElementById("music");

music.play();

document.getElementById("loveMessage").style.display="block";

}

function openImg(src){

document.getElementById("lightbox").style.display="flex";

document.getElementById("preview").src=src;

}

function closeImg(){

document.getElementById("lightbox").style.display="none";

}

setTimeout(()=>{

document.getElementById("loading").style.display="none";

},2500);

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=Math.random()>.5?"🤍":"🌸";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(16+Math.random()*25)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},8000);

},220);

// ===== Animated Star Background =====

const canvas=document.getElementById("stars");

const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

resize();

window.addEventListener("resize",resize);

let stars=[];

for(let s=0;s<220;s++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2,

d:Math.random()*0.4+0.1

});

}

function animateStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{

ctx.beginPath();

ctx.arc(star.x,star.y,star.r,0,Math.PI*2);

ctx.fill();

star.y+=star.d;

if(star.y>canvas.height){

star.y=0;

star.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(animateStars);

}

animateStars();

// ===== Sparkle Effect on Mouse / Touch =====

function sparkle(x,y){

const s=document.createElement("div");

s.innerHTML="✨";

s.style.position="fixed";

s.style.left=x+"px";

s.style.top=y+"px";

s.style.pointerEvents="none";

s.style.fontSize="22px";

s.style.zIndex="99999";

s.style.transition="all .8s ease";

document.body.appendChild(s);

setTimeout(()=>{

s.style.transform="translateY(-40px) scale(1.8)";

s.style.opacity="0";

},10);

setTimeout(()=>{

s.remove();

},800);

}

document.addEventListener("mousemove",(e)=>{

if(Math.random()>.75){

sparkle(e.clientX,e.clientY);

}

});

document.addEventListener("touchmove",(e)=>{

const t=e.touches[0];

if(Math.random()>.7){

sparkle(t.clientX,t.clientY);

}

});

// ===== Fireworks when Love Message appears =====

function fireworks(){

for(let i=0;i<80;i++){

setTimeout(()=>{

const f=document.createElement("div");

f.innerHTML="✨";

f.style.position="fixed";

f.style.left=(window.innerWidth/2)+"px";

f.style.top=(window.innerHeight/2)+"px";

f.style.fontSize=(18+Math.random()*18)+"px";

f.style.pointerEvents="none";

f.style.zIndex="99999";

document.body.appendChild(f);

const dx=(Math.random()-0.5)*700;

const dy=(Math.random()-0.5)*700;

f.animate([

{transform:"translate(0,0)",opacity:1},

{transform:`translate(${dx}px,${dy}px)`,opacity:0}

],{

duration:1800,

easing:"ease-out"

});

setTimeout(()=>{

f.remove();

},1800);

},i*20);

}

}

const oldPlayMusic=playMusic;

playMusic=function(){

oldPlayMusic();

fireworks();

};

</script>

</body>

</html>
